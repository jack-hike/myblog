<!-- Video Shortcode -->
{{ $src := .Get "src" | default "" }}
{{ $title := .Get "title" | default "Video" }}

{{ if $src }}
  <div class="video-container">
    <iframe 
      width="100%" 
      height="400"
      src="{{ $src }}" 
      title="{{ $title }}"
      frameborder="0" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>
  </div>
{{ end }}
